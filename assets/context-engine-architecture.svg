<svg width="680" viewBox="0 0 680 750" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-src { fill: #2d333b; stroke: #444c56; }
        .bg-conn { fill: #1a3a2a; stroke: #2ea04370; }
        .bg-proc { fill: #2a1f3d; stroke: #8b5cf670; }
        .bg-llm { fill: #3b1f1f; stroke: #f0997b70; }
        .bg-db { fill: #1a2a3d; stroke: #85b7eb70; }
        .bg-tbl { fill: #15222e; stroke: #378add50; }
        .bg-redis { fill: #2d2310; stroke: #ef9f2770; }
        .bg-api { fill: #2a1f3d; stroke: #8b5cf670; }
        .bg-ret { fill: #2a1f3d; stroke: #8b5cf670; }
        .bg-ui { fill: #3b1f1f; stroke: #f0997b70; }
        .bg-eval { fill: #2d333b; stroke: #444c56; }
        .t-primary { fill: #e6edf3; }
        .t-secondary { fill: #9198a1; }
        .t-muted { fill: #6e7681; }
        .arr-line { stroke: #6e7681; }
      }
      @media (prefers-color-scheme: light) {
        .bg-src { fill: #f1efe8; stroke: #b4b2a9; }
        .bg-conn { fill: #e1f5ee; stroke: #5dcaa5; }
        .bg-proc { fill: #eeedfe; stroke: #afa9ec; }
        .bg-llm { fill: #faece7; stroke: #f0997b; }
        .bg-db { fill: #e6f1fb; stroke: #85b7eb; }
        .bg-tbl { fill: #d4e8f7; stroke: #85b7eb90; }
        .bg-redis { fill: #faeeda; stroke: #ef9f27; }
        .bg-api { fill: #eeedfe; stroke: #afa9ec; }
        .bg-ret { fill: #eeedfe; stroke: #afa9ec; }
        .bg-ui { fill: #faece7; stroke: #f0997b; }
        .bg-eval { fill: #f1efe8; stroke: #b4b2a9; }
        .t-primary { fill: #1f2328; }
        .t-secondary { fill: #59636e; }
        .t-muted { fill: #818b98; }
        .arr-line { stroke: #818b98; }
      }
    </style>
  </defs>

  <!-- Title -->
  <text class="t-primary" x="340" y="28" text-anchor="middle" font-size="16" font-weight="600">Context Engine — system architecture</text>

  <!-- External Sources -->
  <rect class="bg-src" x="40" y="50" width="120" height="40" rx="8" stroke-width="1"/>
  <text class="t-primary" x="100" y="75" text-anchor="middle" font-size="13" font-weight="500">Slack</text>

  <rect class="bg-src" x="180" y="50" width="120" height="40" rx="8" stroke-width="1"/>
  <text class="t-primary" x="240" y="75" text-anchor="middle" font-size="13" font-weight="500">Notion</text>

  <rect class="bg-src" x="320" y="50" width="120" height="40" rx="8" stroke-width="1"/>
  <text class="t-primary" x="380" y="75" text-anchor="middle" font-size="13" font-weight="500">Zoom</text>

  <rect class="bg-src" x="460" y="50" width="120" height="40" rx="8" stroke-width="1"/>
  <text class="t-primary" x="520" y="75" text-anchor="middle" font-size="13" font-weight="500">GitHub</text>

  <!-- Arrows: Sources → Connectors -->
  <line class="arr-line" x1="100" y1="90" x2="100" y2="125" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line class="arr-line" x1="240" y1="90" x2="240" y2="125" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line class="arr-line" x1="380" y1="90" x2="380" y2="125" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line class="arr-line" x1="520" y1="90" x2="520" y2="125" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Connectors Layer -->
  <rect class="bg-conn" x="40" y="125" width="560" height="50" rx="12" stroke-width="1"/>
  <text class="t-primary" x="320" y="148" text-anchor="middle" font-size="13" font-weight="500">Connectors layer</text>
  <text class="t-secondary" x="320" y="165" text-anchor="middle" font-size="11">app/connectors/ — OAuth, webhooks, polling</text>

  <!-- Arrow: Connectors → Processing -->
  <line class="arr-line" x1="320" y1="175" x2="320" y2="215" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Celery Worker -->
  <rect class="bg-proc" x="60" y="215" width="240" height="52" rx="8" stroke-width="1"/>
  <text class="t-primary" x="180" y="238" text-anchor="middle" font-size="13" font-weight="500">Celery worker</text>
  <text class="t-secondary" x="180" y="255" text-anchor="middle" font-size="11">Sync, extraction, reprocessing tasks</text>

  <!-- LLM Extraction -->
  <rect class="bg-llm" x="340" y="215" width="260" height="52" rx="8" stroke-width="1"/>
  <text class="t-primary" x="470" y="238" text-anchor="middle" font-size="13" font-weight="500">LLM extraction</text>
  <text class="t-secondary" x="470" y="255" text-anchor="middle" font-size="11">LiteLLM → GPT-4.1-mini / local fallback</text>

  <!-- Arrow: Celery → LLM -->
  <line class="arr-line" x1="300" y1="241" x2="338" y2="241" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="t-muted" x="320" y="233" text-anchor="middle" font-size="10">calls</text>

  <!-- Arrows: Processing → DB -->
  <line class="arr-line" x1="180" y1="267" x2="180" y2="305" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line class="arr-line" x1="470" y1="267" x2="470" y2="305" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PostgreSQL Container -->
  <rect class="bg-db" x="40" y="305" width="600" height="130" rx="16" stroke-width="1"/>
  <text class="t-primary" x="340" y="330" text-anchor="middle" font-size="14" font-weight="600">PostgreSQL 16 + pgvector</text>

  <!-- Tables inside DB -->
  <rect class="bg-tbl" x="58" y="345" width="106" height="34" rx="6" stroke-width="0.8"/>
  <text class="t-primary" x="111" y="367" text-anchor="middle" font-size="11">source_docs</text>

  <rect class="bg-tbl" x="178" y="345" width="106" height="34" rx="6" stroke-width="0.8"/>
  <text class="t-primary" x="231" y="367" text-anchor="middle" font-size="11">components</text>

  <rect class="bg-tbl" x="298" y="345" width="106" height="34" rx="6" stroke-width="0.8"/>
  <text class="t-primary" x="351" y="367" text-anchor="middle" font-size="11">relationships</text>

  <rect class="bg-tbl" x="418" y="345" width="95" height="34" rx="6" stroke-width="0.8"/>
  <text class="t-primary" x="465" y="367" text-anchor="middle" font-size="11">reviews</text>

  <rect class="bg-tbl" x="527" y="345" width="95" height="34" rx="6" stroke-width="0.8"/>
  <text class="t-primary" x="574" y="367" text-anchor="middle" font-size="11">sync_jobs</text>

  <rect class="bg-tbl" x="58" y="388" width="120" height="30" rx="6" stroke-width="0.8"/>
  <text class="t-secondary" x="118" y="408" text-anchor="middle" font-size="10">provenance links</text>

  <rect class="bg-tbl" x="192" y="388" width="130" height="30" rx="6" stroke-width="0.8"/>
  <text class="t-secondary" x="257" y="408" text-anchor="middle" font-size="10">vector embeddings</text>

  <!-- Arrow: DB → API -->
  <line class="arr-line" x1="340" y1="435" x2="340" y2="475" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Redis -->
  <rect class="bg-redis" x="480" y="475" width="160" height="44" rx="8" stroke-width="1"/>
  <text class="t-primary" x="560" y="502" text-anchor="middle" font-size="13" font-weight="500">Redis 7</text>
  <text class="t-secondary" x="560" y="530" text-anchor="middle" font-size="10">Celery broker + cache</text>

  <!-- FastAPI -->
  <rect class="bg-api" x="60" y="475" width="390" height="52" rx="12" stroke-width="1"/>
  <text class="t-primary" x="255" y="498" text-anchor="middle" font-size="13" font-weight="500">FastAPI server</text>
  <text class="t-secondary" x="255" y="515" text-anchor="middle" font-size="11">app/api/ — 9 route groups, async, Uvicorn</text>

  <!-- Arrow: API ↔ Redis -->
  <line class="arr-line" x1="450" y1="497" x2="478" y2="497" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="t-muted" x="464" y="490" text-anchor="middle" font-size="10">broker</text>

  <!-- Arrow: API → Retrieval -->
  <line class="arr-line" x1="255" y1="527" x2="255" y2="565" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Retrieval Pipeline -->
  <rect class="bg-ret" x="80" y="565" width="360" height="52" rx="12" stroke-width="1"/>
  <text class="t-primary" x="260" y="588" text-anchor="middle" font-size="13" font-weight="500">Retrieval pipeline</text>
  <text class="t-secondary" x="260" y="605" text-anchor="middle" font-size="11">Embed → pgvector → Cohere rerank → provenance</text>

  <!-- Eval Harness -->
  <rect class="bg-eval" x="480" y="572" width="150" height="40" rx="8" stroke-width="1"/>
  <text class="t-primary" x="555" y="597" text-anchor="middle" font-size="12" font-weight="500">Eval harness</text>
  <text class="t-secondary" x="555" y="622" text-anchor="middle" font-size="10">25 gold cases, 5 domains</text>

  <!-- Arrow: Eval → Retrieval -->
  <line class="arr-line" x1="480" y1="592" x2="442" y2="592" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: Retrieval → UI -->
  <line class="arr-line" x1="260" y1="617" x2="260" y2="655" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Operator UI -->
  <rect class="bg-ui" x="60" y="655" width="400" height="56" rx="12" stroke-width="1"/>
  <text class="t-primary" x="260" y="678" text-anchor="middle" font-size="14" font-weight="500">Operator UI</text>
  <text class="t-secondary" x="260" y="698" text-anchor="middle" font-size="11">React + Vite + React Query — 10 product workflows</text>

</svg>
