<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Engine</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("ce-theme");
          const hasStoredTheme = storedTheme === "light" || storedTheme === "dark";
          const theme = hasStoredTheme ? storedTheme : "light";

          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body class="text-gray-900 antialiased dark:text-neutral-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
