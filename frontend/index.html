<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta id="theme-color" name="theme-color" content="#000000" />
    <title>Context Engine</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon.png?v=2" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("ce-theme");
          const hasStoredTheme = storedTheme === "light" || storedTheme === "dark";
          const theme = hasStoredTheme ? storedTheme : "dark";

          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
          document.getElementById("theme-color")?.setAttribute("content", theme === "dark" ? "#000000" : "#ffffff");
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
