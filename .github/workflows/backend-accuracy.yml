name: Backend Accuracy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-accuracy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Run backend accuracy regressions
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine
        run: |
          python -m pytest \
            tests/test_services/test_llm_service.py \
            tests/test_processing/test_embedder.py \
            tests/test_processing/test_extractor.py \
            tests/test_processing/test_eval_harness.py \
            tests/test_evals/test_gold_set.py \
            tests/test_api/test_zoom.py \
            -q
