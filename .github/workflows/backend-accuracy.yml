name: Backend

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-full:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests scripts

      - name: Run full test suite
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine
        run: python -m pytest tests/ -q

  backend-accuracy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Run backend accuracy regressions
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine
        run: |
          python -m pytest \
            tests/test_services/test_llm_service.py \
            tests/test_processing/test_embedder.py \
            tests/test_processing/test_extractor.py \
            tests/test_processing/test_eval_harness.py \
            tests/test_evals/test_demo_seed.py \
            tests/test_evals/test_gold_set.py \
            tests/test_api/test_github.py \
            tests/test_api/test_zoom.py \
            -q

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine
        run: alembic upgrade head

      - name: Seed demo workspace
        id: seed_demo
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine
          REDIS_URL: redis://localhost:6379/0
        run: |
          seed_json=$(python scripts/seed_demo.py --json --replace-existing)
          echo "$seed_json"
          workspace_id=$(python -c 'import json,sys; print(json.load(sys.stdin)["workspace_id"])' <<< "$seed_json")
          echo "workspace_id=$workspace_id" >> "$GITHUB_OUTPUT"

      - name: Run Phase 3B eval CLI
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine
          REDIS_URL: redis://localhost:6379/0
        run: |
          context-engine-eval-regression \
            --workspace-id "${{ steps.seed_demo.outputs.workspace_id }}" \
            --json
