name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Show tool versions
        run: |
          python --version
          node --version
          npm --version
          docker version
          docker compose version

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ctxe verify
        run: |
          set -euo pipefail
          ctxe verify \
            --json \
            --test-database-url postgresql+asyncpg://postgres:postgres@localhost:5432/context_engine_verify \
            | tee release-gate.json

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-report
          path: release-gate.json
          if-no-files-found: ignore

      - name: Publish release gate summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("release-gate.json")
          lines = ["## Release Gate", ""]

          if not report_path.exists():
              lines.append("No `release-gate.json` report was produced.")
          else:
              try:
                  payload = json.loads(report_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  lines.append(f"Failed to parse `release-gate.json`: `{exc}`")
                  lines.extend(["", "```text", report_path.read_text(encoding="utf-8"), "```"])
              else:
                  status = payload.get("status", "unknown")
                  selected = payload.get("selected_phases") or []
                  skipped = payload.get("skipped_phases") or []
                  steps = payload.get("steps") or payload.get("completed_steps") or []

                  lines.append(f"- Status: `{status}`")
                  if selected:
                      lines.append(f"- Selected phases: `{', '.join(selected)}`")
                  if skipped:
                      lines.append(f"- Skipped phases: `{', '.join(skipped)}`")
                  if payload.get("phase"):
                      lines.append(f"- Failing phase: `{payload['phase']}`")
                  if payload.get("next_step"):
                      lines.append(f"- Next step: `{payload['next_step']}`")

                  if steps:
                      lines.extend(
                          [
                              "",
                              "| Phase | Status | Detail |",
                              "| --- | --- | --- |",
                          ]
                      )
                      for step in steps:
                          phase = str(step.get("step", "unknown")).replace("|", "\\|")
                          phase_status = str(step.get("status", "unknown")).replace("|", "\\|")
                          detail = str(step.get("detail", "")).replace("|", "\\|").replace("\n", " ")
                          lines.append(f"| {phase} | {phase_status} | {detail} |")

                  lines.extend(
                      [
                          "",
                          "<details><summary>Raw JSON</summary>",
                          "",
                          "```json",
                          json.dumps(payload, indent=2, sort_keys=True),
                          "```",
                          "</details>",
                      ]
                  )

          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines))
              handle.write("\n")
          PY

      - name: Tear down docker stack
        if: always()
        run: docker compose down -v --remove-orphans
