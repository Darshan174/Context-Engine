name: Bug report
description: Report a reproducible bug in Context Engine.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough source, connector, or graph context for maintainers to reproduce it without guessing.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Connectors
        - Source ingestion
        - Extraction or relationships
        - Board graph
        - Explore graph
        - Query or retrieval trace
        - MCP or context packs
        - Deployment or Docker
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, API responses, graph trace, or failing test output.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Install path: Docker / bare metal
        Database: SQLite / Postgres
        Browser:
        Commit or version:
  - type: checkboxes
    id: contract
    attributes:
      label: Contract checks
      options:
        - label: This report does not include secrets, tokens, or private source document content.
          required: true
        - label: If this is about a connector, I checked whether it is launch-available or coming soon.
          required: false
