# Context Engine — nginx reverse-proxy config
#
# Use this if you already run nginx on the host or if your org standardises
# on it. Otherwise Caddy (deploy/caddy/Caddyfile) is easier because it
# handles cert issuance and renewal automatically.
#
# ──────────────────────────────────────────────────────────────────────
# How to use
# ──────────────────────────────────────────────────────────────────────
# 1. Replace every `context-engine.example.com` below with your domain.
# 2. Issue a cert with certbot:
#
#      sudo apt install nginx certbot python3-certbot-nginx
#      sudo certbot certonly --nginx -d context-engine.example.com
#
#    This writes the cert to /etc/letsencrypt/live/<domain>/.
#    Set up automatic renewal:
#
#      sudo systemctl enable --now certbot.timer
#
# 3. Copy this file to /etc/nginx/sites-available/ and enable it:
#
#      sudo cp deploy/nginx/context-engine.conf \
#          /etc/nginx/sites-available/context-engine.conf
#      sudo ln -s /etc/nginx/sites-available/context-engine.conf \
#          /etc/nginx/sites-enabled/context-engine.conf
#      sudo nginx -t && sudo systemctl reload nginx
#
# 4. Verify:
#      curl -sS https://context-engine.example.com/health
#
# ──────────────────────────────────────────────────────────────────────
# Prerequisites
# ──────────────────────────────────────────────────────────────────────
# - nginx installed and running.
# - The API bound to 127.0.0.1:8000 (the default in docker-compose.yml).
# - Ports 80 and 443 open on the host firewall.
# - DNS pointed at this host.

# HTTP → HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name context-engine.example.com;

    # ACME challenge path for certbot renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name context-engine.example.com;

    # TLS — managed by certbot.
    ssl_certificate     /etc/letsencrypt/live/context-engine.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/context-engine.example.com/privkey.pem;

    # Modern TLS defaults — drop SSLv3, TLS 1.0, TLS 1.1.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — lets clients verify the cert without an extra round trip.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # Security headers. HSTS is commented out — enable it AFTER you are
    # confident cert renewal works (HSTS locks clients into HTTPS for
    # the max-age window).
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Context Engine JSON API payloads for /api/imports can be sizeable
    # (think 500 KB of raw Slack/Zoom text per POST). Default is 1 MB —
    # bump to 10 MB for comfortable import workloads. Increase further
    # if you intend to ingest very large documents.
    client_max_body_size 10m;

    # Log format good enough for ad-hoc grep and Loki ingestion.
    access_log /var/log/nginx/context-engine.access.log;
    error_log  /var/log/nginx/context-engine.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # Preserve client info for FastAPI logging / rate limiting.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upstream timeouts — generous because /api/query can take 10-30 s
        # with provider-backed extraction. Bump higher if you see 504 Gateway
        # Timeout on legitimate long-running queries.
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffer responses of reasonable size; stream larger ones.
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ──────────────────────────────────────────────────────────────────
    # Optional: basic auth. Generate a password file with htpasswd:
    #   sudo apt install apache2-utils
    #   sudo htpasswd -c /etc/nginx/.htpasswd-context-engine founder
    # Then uncomment the two lines below inside `location /`:
    # ──────────────────────────────────────────────────────────────────
    #     auth_basic "Context Engine";
    #     auth_basic_user_file /etc/nginx/.htpasswd-context-engine;

    # ──────────────────────────────────────────────────────────────────
    # Optional: restrict to an allow-list of source IPs. Put these ABOVE
    # the `location /` block (or inside it) and combine with `deny all`.
    # ──────────────────────────────────────────────────────────────────
    #     allow 203.0.113.0/24;
    #     allow 198.51.100.42;
    #     deny  all;
}
